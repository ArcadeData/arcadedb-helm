version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope

  - package-ecosystem: helm
    directory: /charts/arcadedb
    schedule:
      interval: weekly
    labels:
      - dependencies
      - helm
    commit-message:
      prefix: chore
      include: scope
