name: CI - Lint, Unit Tests, Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v4.1.4

      - name: helm lint
        run: make lint

  unittest:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v4.1.4

      - name: helm unittest
        run: make test-unit

  integration:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install kind
        run: |
          curl -sLo /tmp/kind-linux-amd64 \
            https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          curl -sLo /tmp/kind.sha256 \
            https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64.sha256sum
          (cd /tmp && sha256sum -c kind.sha256)
          install -m 0755 /tmp/kind-linux-amd64 /usr/local/bin/kind

      - name: Install kubectl
        run: |
          curl -sLo /tmp/kubectl \
            "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
          curl -sLo /tmp/kubectl.sha256 \
            "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl.sha256"
          echo "$(cat /tmp/kubectl.sha256)  /tmp/kubectl" | sha256sum -c -
          install -m 0755 /tmp/kubectl /usr/local/bin/kubectl

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v4.1.4

      - name: Create kind cluster
        run: kind create cluster --wait 60s

      - name: Install chart
        run: |
          helm install test-arcadedb charts/arcadedb/ \
            --set replicaCount=3 \
            --set persistence.enabled=false \
            --set arcadedb.defaultDatabases="" \
            --set 'arcadedb.extraCommands={-Darcadedb.server.mode=production,-Darcadedb.ha.snapshotThreshold=50}' \
            --timeout 5m \
            --wait

      - name: Run integration tests
        run: make test-integration

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster
