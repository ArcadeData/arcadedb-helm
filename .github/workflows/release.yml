name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Chart version (e.g. 26.5.2)"
        required: true
      app_version:
        description: "ArcadeDB server version (e.g. 26.5.1) - leave blank to keep current appVersion"
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate version format
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if ! echo "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: '${VERSION}' is not valid semver (X.Y.Z)"
            exit 1
          fi

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v4.1.4

      - name: Update Chart.yaml
        env:
          VERSION: ${{ github.event.inputs.version }}
          APP_VERSION: ${{ github.event.inputs.app_version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" charts/arcadedb/Chart.yaml
          if [ -n "${APP_VERSION}" ]; then
            sed -i "s/^appVersion:.*/appVersion: \"${APP_VERSION}\"/" charts/arcadedb/Chart.yaml
          fi
          echo "--- Chart.yaml after update ---"
          cat charts/arcadedb/Chart.yaml

      - name: Lint
        run: helm lint charts/arcadedb/

      - name: Commit and tag
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/arcadedb/Chart.yaml
          git diff --cached --quiet || git commit -m "chore(helm): release v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD --follow-tags

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@a917fd15b20e8b64b94d9158ad54cd6345335584 # v1.6.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: charts
          skip_existing: true
